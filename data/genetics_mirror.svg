  </g>
  <g id="text_28">
   <text style="font-size: 9.5px; font-family: 'Helvetica Neue'; text-anchor: start; fill: #5b544e" x="7.2" y="55.604062" transform="rotate(-0 7.2 55.604062)">Scored against the mechanistic / cell / animal / human-PD rubric plus a genetics column (genetic_only_v1), using evidence available at each program's OWN start — not present-day data. Anti-Aβ antibodies had strong human genetics and failed on the causal hypothesis; exenatide had none and succeeded on convergent mechanistic + animal + human-PD evidence.</text>
